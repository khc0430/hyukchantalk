<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>혁찬톡 - 즐거운 대화</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main-yellow: #fee500; --bg-blue: #abc1d1; --text-brown: #3c1e1e; --my-msg: #fee500; --other-msg: #ffffff; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; margin: 0; background: var(--bg-blue); display: flex; height: 100vh; overflow: hidden; }
        
        /* Login Screen */
        .login-overlay { position: fixed; inset: 0; background: var(--main-yellow); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .login-box { width: 300px; text-align: center; }
        .login-box h1 { color: var(--text-brown); margin-bottom: 40px; font-size: 3rem; }
        .login-box input { width: 100%; padding: 15px; border: none; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        .login-box button { width: 100%; padding: 15px; background: var(--text-brown); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* Sidebar */
        .sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 30px 20px; background: #f8f8f8; border-bottom: 1px solid #eee; text-align: center; }
        .my-avatar { width: 80px; height: 80px; border-radius: 30px; object-fit: cover; margin-bottom: 15px; border: 1px solid #eee; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid #f9f9f9; }
        .user-item:hover { background: #f5f5f5; }
        .item-avatar { width: 50px; height: 50px; border-radius: 20px; object-fit: cover; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 5px; }
        .status-dot.online { background: #4CAF50; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-win { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; flex-direction: column; max-width: 80%; }
        .msg-row.mine { align-self: flex-end; align-items: flex-end; }
        .msg-row.others { align-self: flex-start; }
        .msg-bubble { padding: 10px 15px; border-radius: 10px; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .mine .msg-bubble { background: var(--my-msg); color: var(--text-brown); border-top-right-radius: 2px; }
        .others .msg-bubble { background: var(--other-msg); color: #000; border-top-left-radius: 2px; }
        .msg-info { font-size: 0.7rem; color: #555; margin-top: 5px; }
        .msg-name { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #333; }

        /* Input Box */
        .input-box { padding: 15px; background: #fff; display: flex; gap: 10px; align-items: center; }
        .input-box input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; outline: none; font-size: 1rem; }
        .input-box button { padding: 12px 25px; background: var(--main-yellow); border: 1px solid #ddd; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 15px; width: 320px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; color: var(--text-brown); }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        
        @media (max-width: 600px) {
            .sidebar { width: 80px; }
            .sidebar-header h3, .sidebar-header button, .user-item div { display: none; }
            .my-avatar { width: 50px; height: 50px; }
            .item-avatar { width: 45px; height: 45px; }
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <h1>혁찬톡</h1>
            <input type="text" id="join-id" placeholder="아이디를 입력하세요" onkeypress="if(event.keyCode==13) join()">
            <button onclick="join()">시작하기</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <img id="my-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="my-avatar">
            <h3 id="my-name" style="margin:0; color:var(--text-brown);">이름</h3>
            <button onclick="document.getElementById('edit-modal').style.display='flex'" style="margin-top:10px; padding:5px 15px; border-radius:15px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:0.8rem;">프로필 편집</button>
        </div>
        <div id="user-list" class="user-list"></div>
    </div>

    <div class="chat-area">
        <div id="chat-win" class="chat-win"></div>
        <div class="input-box">
            <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) send()">
            <button onclick="send()">전송</button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>내 프로필 편집</h3>
            <label style="font-size:0.8rem; color:gray;">프로필 사진</label>
            <input type="file" id="p-pic" accept="image/*">
            <label style="font-size:0.8rem; color:gray;">닉네임</label>
            <input type="text" id="p-name" placeholder="닉네임">
            <label style="font-size:0.8rem; color:gray;">상태 메시지</label>
            <input type="text" id="p-status" placeholder="상태 메시지">
            <div class="modal-actions">
                <button onclick="saveProfile()" style="padding:10px 20px; background:var(--main-yellow); border:none; border-radius:5px; cursor:pointer;">저장</button>
                <button onclick="document.getElementById('edit-modal').style.display='none'" style="padding:10px 20px; background:#eee; border:none; border-radius:5px; cursor:pointer;">닫기</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myId = '';

        function join() {
            const input = document.getElementById('join-id');
            myId = input.value.trim();
            if(!myId) return alert('아이디를 입력해 주세요!');
            
            socket.emit('join', myId);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('my-name').innerText = myId;
            
            // 10초마다 하트비트 전송
            setInterval(() => socket.emit('heartbeat'), 10000);
        }

        function send() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            socket.emit('send_msg', { text: text });
            input.value = '';
        }

        socket.on('new_msg', (m) => {
            const win = document.getElementById('chat-win');
            const isMine = m.user === myId;
            
            const row = document.createElement('div');
            row.className = `msg-row ${isMine ? 'mine' : 'others'}`;
            
            let html = '';
            if(!isMine) html += `<span class="msg-name">${m.name}</span>`;
            html += `<div class="msg-bubble">${m.text}</div>`;
            html += `<span class="msg-info">${m.time}</span>`;
            
            row.innerHTML = html;
            win.appendChild(row);
            win.scrollTop = win.scrollHeight;
        });

        socket.on('user_list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            users.forEach(u => {
                if(u.id === myId) {
                    document.getElementById('my-pic').src = u.profilePic;
                    document.getElementById('my-name').innerText = u.name;
                    return;
                }
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    <img src="${u.profilePic}" class="item-avatar" style="opacity: ${u.active ? 1 : 0.5}">
                    <div style="flex:1">
                        <div style="font-weight:bold; color:var(--text-brown);">${u.name}</div>
                        <div style="font-size:0.8rem; color:#888;">
                            <span class="status-dot ${u.active ? 'online' : ''}"></span>${u.statusMsg}
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        function saveProfile() {
            const formData = new FormData();
            formData.append('userId', myId);
            formData.append('name', document.getElementById('p-name').value);
            formData.append('statusMsg', document.getElementById('p-status').value);
            const picFile = document.getElementById('p-pic').files[0];
            if(picFile) formData.append('profile_pic', picFile);

            fetch('/upload', { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                socket.emit('join', myId); // 정보 즉시 갱신
                document.getElementById('edit-modal').style.display = 'none';
            });
        }
    </script>
</body>
</html>
