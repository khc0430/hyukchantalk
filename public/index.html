<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>혁찬톡 : 고양이 천국</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu&display=swap');

        :root {
            --bg-color: #FFF9E1;
            --main-brown: #5D4037;
            --soft-yellow: #FFECB3;
            --accent-orange: #FFB74D;
            --white: #FFFFFF;
            --gray: #BDBDBD;
        }

        * { box-sizing: border-box; font-family: 'Gaegu', cursive; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-color); color: var(--main-brown); overflow: hidden; }

        /* 배경 고양이 패턴 */
        .pattern-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/cute-grit.png');
            opacity: 0.3; z-index: -1;
        }

        #app { display: flex; flex-direction: column; width: 100%; height: 100%; max-width: 500px; margin: 0 auto; background: var(--white); position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        /* 로그인 & 공지 모달 */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index: 1000; }
        .modal-card { width: 85%; background: var(--white); border-radius: 30px; padding: 25px; text-align: center; border: 4px solid var(--soft-yellow); }
        .cat-btn { background: var(--accent-orange); color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-size: 1.2rem; margin-top: 10px; }
        .cat-input { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--soft-yellow); margin-bottom: 10px; outline: none; }

        /* 헤더 */
        header { height: 60px; display: flex; align-items: center; justify-content: center; background: var(--soft-yellow); font-size: 1.5rem; font-weight: bold; border-bottom: 2px solid var(--main-brown); position: relative;}
        .noti-badge { position: absolute; top: 5px; right: 15px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.8rem; display: none; }

        /* 컨텐츠 영역 */
        main { flex: 1; overflow-y: auto; padding-bottom: 70px; position: relative; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        /* 하단 네비게이션 */
        nav { position: absolute; bottom: 0; width: 100%; height: 70px; display: flex; background: var(--soft-yellow); border-top: 2px solid var(--main-brown); z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .nav-item i { font-size: 1.5rem; margin-bottom: 2px; }
        .nav-item.active { color: var(--accent-orange); }
        .badge { position: absolute; top: 10px; right: 20%; background: #FF5252; color: white; border-radius: 10px; padding: 2px 6px; font-size: 0.7rem; font-weight: bold; }

        /* 말풍선 디자인 */
        .msg-box { display: flex; flex-direction: column; margin-bottom: 15px; max-width: 80%; }
        .msg-me { align-self: flex-end; }
        .msg-other { align-self: flex-start; }
        .bubble { padding: 12px 18px; border-radius: 25px; font-size: 1.1rem; line-height: 1.4; word-break: break-all; position: relative; }
        .msg-me .bubble { background: var(--soft-yellow); border-bottom-right-radius: 5px; }
        .msg-other .bubble { background: #F1F1F1; border-bottom-left-radius: 5px; }
        .read-status { font-size: 0.7rem; color: var(--accent-orange); margin: 0 5px; align-self: flex-end; }
        .typing-box { font-style: italic; font-size: 0.9rem; padding: 5px 15px; color: var(--gray); min-height: 20px; }

        /* 피드 스타일 */
        .feed-card { background: #FFF; border: 2px solid var(--soft-yellow); border-radius: 20px; margin-bottom: 20px; overflow: hidden; }
        .feed-img { width: 100%; height: 250px; object-fit: cover; }
        .feed-body { padding: 15px; }
        .comment-tree { margin-left: 20px; border-left: 2px dashed var(--soft-yellow); padding-left: 10px; }

        /* 유저 리스트 */
        .user-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #EEE; cursor: pointer; }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid var(--soft-yellow); }
        .online-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; margin-left: -25px; margin-top: 35px; z-index: 10; }

        /* 채팅 입력창 */
        .chat-input-area { padding: 10px; display: flex; background: white; border-top: 1px solid #EEE; }
        
        /* 알림 스낵바 */
        #snackbar { visibility: hidden; min-width: 250px; background-color: var(--main-brown); color: #fff; text-align: center; border-radius: 30px; padding: 16px; position: fixed; z-index: 2000; left: 50%; top: 30px; transform: translateX(-50%); font-size: 1.1rem; border: 2px solid var(--accent-orange); cursor: pointer;}
        #snackbar.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>
    <div class="pattern-bg"></div>
    
    <div id="app">
        <div id="auth-modal" class="modal-overlay">
            <div class="modal-card">
                <img src="https://cdn-icons-png.flaticon.com/512/6915/6915987.png" width="80">
                <h2>혁찬톡 입장하기</h2>
                <input id="auth-id" class="cat-input" placeholder="아이디(별명)를 입력해냥">
                <input id="auth-pw" type="password" class="cat-input" placeholder="비밀번호">
                <div style="display:flex; gap:10px;">
                    <button class="cat-btn" onclick="handleAuth('login')" style="flex:1">로그인</button>
                    <button class="cat-btn" onclick="handleAuth('signup')" style="flex:1; background:var(--gray)">가입하기</button>
                </div>
            </div>
        </div>

        <div id="notice-modal" class="modal-overlay" style="display:none">
            <div class="modal-card">
                <h2>🐾 필독 공지 🐾</h2>
                <p>"반갑다. 나 권혁찬인데 재밌게 즐겼으면 좋겠다."</p>
                <div style="text-align:left; font-size:0.9rem; background:#FFFDE7; padding:10px; border-radius:15px;">
                    - 1탭: 프로필 수정과 사진 피드 올리기!<br>
                    - 2탭: 친구들의 온라인 상태 확인과 1:1 대화!<br>
                    - 3탭: 모두와 함께 떠드는 전체 채팅!<br>
                    - 읽음 확인과 실시간 알림도 지원해냥!
                </div>
                <button class="cat-btn" onclick="closeNotice()">알겠다냥!</button>
            </div>
        </div>

        <div id="profile-modal" class="modal-overlay" style="display:none">
            <div class="modal-card">
                <img id="p-modal-img" src="" class="profile-img" style="width:100px; height:100px;">
                <h2 id="p-modal-nick"></h2>
                <p id="p-modal-status"></p>
                <hr>
                <div id="guestbook-list" style="max-height:150px; overflow-y:auto; text-align:left;"></div>
                <button class="cat-btn" id="start-chat-btn">1:1 채팅하기 🐾</button>
                <button class="cat-btn" onclick="closeProfileModal()" style="background:var(--gray)">닫기</button>
            </div>
        </div>

        <header>
            <span id="header-title">혁찬톡</span>
            <div id="top-noti" class="noti-badge">0</div>
        </header>

        <main id="main-scroll">
            <div id="tab1" class="tab-content active">
                <div class="feed-header" style="background:var(--soft-yellow); padding:15px; border-radius:20px; margin-bottom:15px;">
                    <div style="display:flex; align-items:center;">
                        <img id="my-img" class="profile-img" src="">
                        <div>
                            <h3 id="my-nick" style="margin:0"></h3>
                            <p id="my-status" style="margin:0; font-size:0.9rem;"></p>
                        </div>
                        <button onclick="openEditProfile()" style="margin-left:auto; border:none; background:none; font-size:1.2rem;"><i class="fa-solid fa-gear"></i></button>
                    </div>
                </div>
                <div id="feed-input-area" style="margin-bottom:20px;">
                    <textarea id="feed-text" class="cat-input" placeholder="무슨 생각 하냥?"></textarea>
                    <input id="feed-img-url" class="cat-input" placeholder="이미지 주소(선택)">
                    <button class="cat-btn" style="width:100%" onclick="postFeed()">피드 올리기 🐾</button>
                </div>
                <div id="feed-list"></div>
            </div>

            <div id="tab2" class="tab-content">
                <div id="user-list"></div>
            </div>

            <div id="tab3" class="tab-content" style="padding:0; height:100%; display:flex; flex-direction:column;">
                <div id="chat-messages" style="flex:1; overflow-y:auto; padding:15px;"></div>
                <div id="typing-indicator" class="typing-box"></div>
                <div class="chat-input-area">
                    <input id="chat-input" class="cat-input" style="margin:0; flex:1" placeholder="메시지 입력해냥...">
                    <button onclick="sendMessage()" style="border:none; background:none; color:var(--accent-orange); font-size:1.5rem; margin-left:10px;"><i class="fa-solid fa-paw"></i></button>
                </div>
            </div>
        </main>

        <nav>
            <div class="nav-item active" onclick="changeTab(1)">
                <i class="fa-solid fa-cat"></i>
                <span>피드</span>
            </div>
            <div class="nav-item" onclick="changeTab(2)">
                <i class="fa-solid fa-paw"></i>
                <span>친구</span>
                <div id="badge-friends" class="badge" style="display:none">0</div>
            </div>
            <div class="nav-item" onclick="changeTab(3, 'global')">
                <i class="fa-solid fa-comments"></i>
                <span>전체채팅</span>
                <div id="badge-global" class="badge" style="display:none">0</div>
            </div>
        </nav>

        <div id="snackbar"></div>
    </div>

    <audio id="meow-sound" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>

    <script>
        const socket = io();
        let myInfo = null;
        let currentTab = 1;
        let chatTarget = 'global'; // 'global' or 'userId'
        let unreadGlobal = 0;
        let unreadPrivate = new Set();
        let typingTimeout;

        // --- 인증 로직 ---
        function handleAuth(type) {
            const id = document.getElementById('auth-id').value;
            const pw = document.getElementById('auth-pw').value;
            if(!id || !pw) return alert('입력해냥!');
            socket.emit('auth', { type, id, pw, nick: id });
        }

        socket.on('auth_res', ({ success, user, msg, isNew }) => {
            if (success) {
                myInfo = user;
                document.getElementById('auth-modal').style.display = 'none';
                if (isNew) document.getElementById('notice-modal').style.display = 'flex';
                socket.emit('login_success', myInfo.id);
                updateMyProfileUI();
                playMeow();
            } else {
                alert(msg);
            }
        });

        function closeNotice() { document.getElementById('notice-modal').style.display = 'none'; }

        // --- 탭 전환 ---
        function changeTab(num, target = null) {
            currentTab = num;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab${num}`).classList.add('active');
            document.querySelectorAll('.nav-item')[num-1].classList.add('active');

            if (num === 3) {
                chatTarget = target || 'global';
                document.getElementById('header-title').innerText = chatTarget === 'global' ? '전체 채팅방' : '1:1 채팅방';
                if (chatTarget === 'global') {
                    unreadGlobal = 0;
                    updateBadges();
                    loadGlobalChat();
                } else {
                    socket.emit('join_private', chatTarget);
                    // 개인채팅 뱃지 차감 로직
                    unreadPrivate.delete(chatTarget);
                    updateBadges();
                }
            } else {
                document.getElementById('header-title').innerText = '혁찬톡';
            }
        }

        // --- 피드 로직 ---
        function postFeed() {
            const content = document.getElementById('feed-text').value;
            const img = document.getElementById('feed-img-url').value;
            if(!content) return;
            socket.emit('post_feed', { content, img });
            document.getElementById('feed-text').value = '';
            document.getElementById('feed-img-url').value = '';
        }

        socket.on('feed_update', (feeds) => {
            const container = document.getElementById('feed-list');
            container.innerHTML = feeds.map(feed => `
                <div class="feed-card">
                    <div style="padding:10px; display:flex; align-items:center;">
                        <img src="${feed.authorImg}" class="profile-img" style="width:30px; height:30px;">
                        <strong>${feed.authorNick}</strong>
                    </div>
                    ${feed.img ? `<img src="${feed.img}" class="feed-img">` : ''}
                    <div class="feed-body">
                        <p>${feed.content}</p>
                        <div style="color:var(--accent-orange); font-size:0.9rem;">
                            <i class="fa-solid fa-heart"></i> ${feed.likes.length} &nbsp; 
                            <i class="fa-solid fa-comment"></i> ${feed.comments.length}
                        </div>
                        <div class="comment-area">
                            ${feed.comments.filter(c => !c.parentId).map(c => `
                                <div style="font-size:0.85rem; margin-top:5px;">
                                    <b>${c.authorNick}:</b> ${c.text}
                                    <span onclick="replyComment(${feed.id}, ${c.id})" style="color:var(--gray); cursor:pointer"> [답글]</span>
                                </div>
                                ${feed.comments.filter(rc => rc.parentId === c.id).map(rc => `
                                    <div style="font-size:0.8rem; margin-top:3px; margin-left:15px; color:#777;">
                                        ↳ <b>${rc.authorNick}:</b> ${rc.text}
                                    </div>
                                `).join('')}
                            `).join('')}
                        </div>
                        <input class="cat-input" style="height:30px; margin-top:10px; font-size:0.8rem;" placeholder="댓글 달기..." onkeypress="if(event.keyCode==13) addComment(${feed.id}, this)">
                    </div>
                </div>
            `).join('');
        });

        function addComment(feedId, input) {
            if(!input.value) return;
            socket.emit('add_comment', { feedId, text: input.value });
            input.value = '';
        }

        // --- 채팅 로직 ---
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            if(chatTarget === 'global') {
                socket.emit('send_global', input.value);
            } else {
                socket.emit('send_private', { targetId: chatTarget, text: input.value });
            }
            input.value = '';
            socket.emit('typing', { targetId: chatTarget, isTyping: false });
        }

        // 입력 중 감지
        document.getElementById('chat-input').addEventListener('input', () => {
            socket.emit('typing', { targetId: chatTarget, isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { targetId: chatTarget, isTyping: false });
            }, 2000);
        });

        socket.on('display_typing', ({ nick, isTyping }) => {
            document.getElementById('typing-indicator').innerText = isTyping ? `${nick}님이 입력 중...냥` : '';
        });

        socket.on('receive_global', (msg) => {
            if (currentTab === 3 && chatTarget === 'global') {
                renderMessage(msg, 'global');
            } else {
                unreadGlobal++;
                updateBadges();
            }
        });

        socket.on('receive_private', (msg) => {
            // 보낸 사람이 나거나, 현재 해당 대화방을 보고 있는 경우
            if (msg.sender === myInfo.id || (currentTab === 3 && chatTarget === msg.sender)) {
                renderMessage(msg, 'private');
                if (msg.sender !== myInfo.id) playMeow();
            }
        });

        function renderMessage(msg, type) {
            const container = document.getElementById('chat-messages');
            const isMe = (type === 'global' ? msg.senderId : msg.sender) === myInfo.id;
            const timeStr = new Date(msg.time).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

            const html = `
                <div class="msg-box ${isMe ? 'msg-me' : 'msg-other'}">
                    <div style="font-size:0.8rem; margin-bottom:3px;">${isMe ? '' : (msg.senderNick || msg.sender)}</div>
                    <div style="display:flex; ${isMe ? 'flex-direction:row-reverse' : ''}">
                        <div class="bubble">${msg.text}</div>
                        <div class="read-status">${msg.read === false && isMe ? '1' : ''} <br> ${timeStr}</div>
                    </div>
                </div>
            `;
            container.innerHTML += html;
            container.scrollTop = container.scrollHeight;
        }

        socket.on('read_update', () => {
            // 1:1 채팅에서 상대가 들어왔을 때 숫자 1 지우기 위해 다시 렌더링하거나 DOM 조작
            const statuses = document.querySelectorAll('.read-status');
            statuses.forEach(s => { if(s.innerText.includes('1')) s.innerText = s.innerText.replace('1', '읽음'); });
        });

        // --- 알림 시스템 ---
        socket.on('noti', ({ msg, target, from }) => {
            showSnackbar(msg, target, from);
            if (target === 'chat_list') {
                unreadPrivate.add(from);
                updateBadges();
            }
        });

        function showSnackbar(msg, target, from) {
            const sb = document.getElementById('snackbar');
            sb.innerText = msg;
            sb.className = "show";
            sb.onclick = () => {
                if(target === 'feed') changeTab(1);
                else if(target === 'chat_list') changeTab(3, from);
            };
            setTimeout(() => { sb.className = sb.className.replace("show", ""); }, 3000);
            playMeow();
        }

        // --- 유저 리스트 및 프로필 모달 ---
        socket.on('update_user_list', ({ users }) => {
            const list = document.getElementById('user-list');
            list.innerHTML = users.filter(u => u.id !== myInfo.id).map(u => `
                <div class="user-item" onclick="openProfileModal('${u.id}', '${u.nick}', '${u.img}', '${u.status}')">
                    <img src="${u.img}" class="profile-img">
                    <div class="online-dot" style="background:${u.isOnline ? '#4CAF50' : '#9E9E9E'}"></div>
                    <div>
                        <div style="font-weight:bold">${u.nick}</div>
                        <div style="font-size:0.8rem; color:#777">${u.status}</div>
                    </div>
                </div>
            `).join('');
        });

        function openProfileModal(id, nick, img, status) {
            document.getElementById('p-modal-img').src = img;
            document.getElementById('p-modal-nick').innerText = nick;
            document.getElementById('p-modal-status').innerText = status;
            document.getElementById('start-chat-btn').onclick = () => {
                closeProfileModal();
                changeTab(3, id);
            };
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function closeProfileModal() { document.getElementById('profile-modal').style.display = 'none'; }

        // --- 기타 유틸 ---
        function updateMyProfileUI() {
            document.getElementById('my-img').src = myInfo.img;
            document.getElementById('my-nick').innerText = myInfo.nick;
            document.getElementById('my-status').innerText = myInfo.status;
        }

        function updateBadges() {
            const gBadge = document.getElementById('badge-global');
            if(unreadGlobal > 0) { gBadge.style.display = 'block'; gBadge.innerText = unreadGlobal; }
            else gBadge.style.display = 'none';

            const fBadge = document.getElementById('badge-friends');
            if(unreadPrivate.size > 0) { fBadge.style.display = 'block'; fBadge.innerText = unreadPrivate.size; }
            else fBadge.style.display = 'none';
        }

        function playMeow() {
            const sound = document.getElementById('meow-sound');
            sound.currentTime = 0;
            sound.play().catch(()=>{});
        }

        function openEditProfile() {
            const newNick = prompt("새 닉네임 입력해냥", myInfo.nick);
            const newStatus = prompt("상태 메시지 입력해냥", myInfo.status);
            const newImg = prompt("이미지 URL 입력해냥", myInfo.img);
            if(newNick) {
                myInfo.nick = newNick;
                myInfo.status = newStatus;
                myInfo.img = newImg;
                socket.emit('update_profile', myInfo);
                updateMyProfileUI();
            }
        }

        socket.on('refresh_data', () => { /* 필요 시 자동 새로고침 */ });
    </script>
</body>
</html>
