<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>혁찬톡 - 즐거운 대화</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; --text: #1c1e21; --secondary-text: #65676b; }
        * { box-sizing: border-box; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 360px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; transition: all 0.3s; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #f0f2f5; }
        .my-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }
        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .user-item:hover { background: #f0f2f5; }
        .user-item.active { background: #e7f3ff; color: var(--primary); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 12px; left: 45px; }
        .status-online { background: #31a24c; }
        .status-offline { background: #bec3c9; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; background: white; position: relative; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 15px; background: white; z-index: 10; }
        .chat-window { flex: 1; overflow-y: auto; padding: 20px; background: #fff; display: flex; flex-direction: column; gap: 10px; }
        
        /* Messages */
        .message { max-width: 70%; display: flex; flex-direction: column; }
        .message.mine { align-self: flex-end; align-items: flex-end; }
        .message.others { align-self: flex-start; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .mine .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .others .msg-bubble { background: #f0f2f5; color: var(--text); border-bottom-left-radius: 4px; }
        .msg-info { font-size: 0.75rem; color: var(--secondary-text); margin-top: 4px; }
        .msg-sender { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }

        /* Input Area */
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: none; background: #f0f2f5; border-radius: 20px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; }
        .modal-content h2 { margin-top: 0; }
        .modal-content label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e4e6eb; color: #4b4f56; }

        /* Profile Card for Sidebar */
        .profile-card { padding: 20px; background: #f7f8fa; border-radius: 10px; margin-bottom: 10px; display: none; flex-direction: column; align-items: center; text-align: center; }
        .profile-card img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar-header h3, .sidebar-header small, .sidebar-header .btn-primary, .user-item span, .user-item small { display: none; }
            .my-profile { justify-content: center; margin-bottom: 0; }
            .avatar { width: 40px; height: 40px; }
            .status-dot { left: 35px; bottom: 10px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="my-profile">
                <img src="{{ user.profile_pic }}" class="avatar" id="my-avatar-img">
                <div>
                    <h3 style="margin:0; font-size:1.1rem;">{{ user.name }}</h3>
                    <small style="color:var(--secondary-text)">{{ user.status_msg }}</small>
                </div>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="openModal('edit-modal')">내 프로필 수정</button>
            <center><a href="/logout" style="font-size:0.8rem; color:var(--secondary-text); display:block; margin-top:10px;">로그아웃</a></center>
        </div>
        <div class="user-list">
            <div class="user-item active" id="global-chat-btn" onclick="switchChat('global')">
                <span style="font-size:1.5rem">🌐</span>
                <div style="flex:1">
                    <span style="font-weight:bold">전체 채팅방</span><br>
                    <small style="color:var(--secondary-text)">모두와 함께 대화해요</small>
                </div>
            </div>
            <div id="other-users"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header">
            <img src="/static/default_profile.png" id="header-avatar" class="avatar" style="display:none; width:40px; height:40px;">
            <h3 id="chat-title" style="margin:0">전체 채팅방</h3>
        </div>
        
        <div id="chat-window" class="chat-window"></div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMessage()">
            <button class="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2>내 프로필 수정</h2>
            <form id="profile-form">
                <label>프로필 사진</label>
                <input type="file" name="profile_pic" accept="image/*">
                <label>이름</label>
                <input type="text" name="name" value="{{ user.name }}" required>
                <label>상태 메시지</label>
                <input type="text" name="status_msg" value="{{ user.status_msg }}">
                <label>자기소개</label>
                <textarea name="bio" rows="4">{{ user.bio }}</textarea>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('edit-modal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Profile Modal -->
    <div id="view-modal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <img id="v-avatar" src="" class="avatar" style="width:100px; height:100px; margin-bottom:15px;">
            <h2 id="v-name" style="margin:0"></h2>
            <p id="v-status" style="color:var(--secondary-text); margin:10px 0;"></p>
            <div id="v-bio" style="background:#f0f2f5; padding:15px; border-radius:10px; font-size:0.9rem; text-align:left;"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="v-chat-btn">1:1 채팅하기</button>
                <button class="btn btn-secondary" onclick="closeModal('view-modal')">닫기</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentChatType = 'global';
        let currentTarget = '';
        const myId = '{{ user.id }}';

        // Initialize
        socket.emit('join_global');

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Switch Chat
        function switchChat(type, targetId = '', name = '', pic = '') {
            currentChatType = type;
            currentTarget = targetId;
            document.getElementById('chat-window').innerHTML = '';
            document.getElementById('chat-title').innerText = type === 'global' ? '전체 채팅방' : name;
            
            const headerAvatar = document.getElementById('header-avatar');
            if(type === 'private') {
                headerAvatar.src = pic;
                headerAvatar.style.display = 'block';
                socket.emit('join_private', { target_id: targetId });
            } else {
                headerAvatar.style.display = 'none';
                socket.emit('join_global');
            }

            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            if(type === 'global') document.getElementById('global-chat-btn').classList.add('active');
            else document.getElementById('user-'+targetId).classList.add('active');
        }

        // Send Message
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;

            if(currentChatType === 'global') {
                socket.emit('send_global', { text: text });
            } else {
                socket.emit('send_private', { target_id: currentTarget, text: text });
            }
            input.value = '';
        }

        // Socket Events
        socket.on('init_messages', (msgs) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            msgs.forEach(appendMessage);
            win.scrollTop = win.scrollHeight;
        });

        socket.on('new_message', (msg) => {
            appendMessage(msg);
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        });

        function appendMessage(msg) {
            const win = document.getElementById('chat-window');
            const isMine = (msg.user === myId || msg.from === myId);
            const div = document.createElement('div');
            div.className = `message ${isMine ? 'mine' : 'others'}`;
            
            let html = '';
            if(!isMine && currentChatType === 'global') {
                html += `<div class="msg-sender"><img src="${msg.profile_pic}" style="width:20px;height:20px;border-radius:50%"> ${msg.name}</div>`;
            }
            html += `<div class="msg-bubble">${msg.text}</div>`;
            html += `<div class="msg-info">${msg.time}</div>`;
            
            div.innerHTML = html;
            win.appendChild(div);
        }

        // Update User Status List
        function updateStatus() {
            fetch('/api/status').then(r => r.json()).then(users => {
                const list = document.getElementById('other-users');
                list.innerHTML = '';
                users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = `user-item ${currentTarget === u.id ? 'active' : ''}`;
                    div.id = 'user-' + u.id;
                    div.onclick = () => showProfile(u);
                    div.innerHTML = `
                        <img src="${u.profile_pic}" class="avatar">
                        <div class="status-dot ${u.status === '활동 중' ? 'status-online' : 'status-offline'}"></div>
                        <div style="flex:1">
                            <span style="font-weight:bold">${u.name}</span><br>
                            <small style="color:var(--secondary-text)">${u.status_msg}</small>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }
        setInterval(updateStatus, 10000);
        updateStatus();

        function showProfile(u) {
            document.getElementById('v-avatar').src = u.profile_pic;
            document.getElementById('v-name').innerText = u.name;
            document.getElementById('v-status').innerText = u.status_msg;
            document.getElementById('v-bio').innerText = u.bio || '안녕하세요!';
            document.getElementById('v-chat-btn').onclick = () => {
                closeModal('view-modal');
                switchChat('private', u.id, u.name, u.profile_pic);
            };
            openModal('view-modal');
        }

        // Profile Form Submit
        document.getElementById('profile-form').onsubmit = function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('/api/profile/update', {
                method: 'POST',
                body: formData
            }).then(() => location.reload());
        };
    </script>
</body>
</html>
